<!DOCTYPE html>
<html>
<head>
    <title>Crop Yield Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🌾 Crop Yield Prediction</h1>

    <form action="/predict" method="post">

        <input type="text" name="crop" placeholder="Enter Crop" required>
        <input type="text" name="state" placeholder="Enter State" required>

        <input type="number" name="a2fl" placeholder="Cost A2FL" required>
        <input type="number" name="c2" placeholder="Cost C2" required>
        <input type="number" name="pc" placeholder="Production Cost" required>

        <button type="submit">Predict</button>

    </form>

    {% if result %}
        <h2>Predicted Yield: {{ result }}</h2>
    {% endif %}
</div>

</body>
</html>
